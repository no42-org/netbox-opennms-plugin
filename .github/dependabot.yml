# Keep SHA-pinned GitHub Actions and the Python dependencies current (Story 4.4).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
  # The repo has no Dockerfiles — container images are pinned in Compose files,
  # which the "docker" ecosystem does not scan (it fails the update job).
  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/quickstart"
    schedule:
      interval: "weekly"
    ignore:
      # A PostgreSQL major bump is a deliberate migration, not a routine
      # update: the postgres:18 image moved PGDATA (breaks our
      # /var/lib/postgresql/data mounts) and quickstart's persistent PG16
      # volume needs pg_upgrade. See #40/#43.
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
