# Keep SHA-pinned GitHub Actions and the Python dependencies current (Story 4.4).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
  # The repo has no Dockerfiles — container images are pinned in Compose files,
  # which the "docker" ecosystem does not scan (it fails the update job).
  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/quickstart"
    schedule:
      interval: "weekly"
