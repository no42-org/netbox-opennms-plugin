# PyPI release for netbox-opennms-plugin. Runs when a GitHub Release is
# published (never on raw tag pushes). Build reuses `make build`; publishing
# uses PyPI Trusted Publishing (OIDC) — no API token secrets.
#
# The PyPI trusted-publisher binding is registered against THIS filename
# (release.yml) and the `pypi` environment. Renaming either breaks OIDC
# authentication until the binding on pypi.org is updated.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Gate + build + verify artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Assert release tag matches __version__
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          python3 - "$TAG" <<'PY'
          import ast, sys

          tag = sys.argv[1].removeprefix("v")
          # Same AST read pyproject uses — importing the module needs NetBox.
          tree = ast.parse(open("netbox_opennms/__init__.py").read())
          for node in tree.body:
              if isinstance(node, ast.Assign) and any(
                  isinstance(t, ast.Name) and t.id == "__version__"
                  for t in node.targets
              ):
                  version = node.value.value
                  break
          else:
              sys.exit("no __version__ in netbox_opennms/__init__.py")
          if tag != version:
              sys.exit(
                  f"release tag says {tag!r} but __version__ is {version!r} — "
                  "merge the version-bump PR before releasing"
              )
          print(f"ok: release tag matches __version__ {version}")
          PY
      - name: make build
        run: make build
      - name: Assert the wheel contains the templates
        run: |
          python3 - <<'PY'
          import glob, sys, zipfile
          wheel = sorted(glob.glob("dist/*.whl"))[-1]
          names = set(zipfile.ZipFile(wheel).namelist())
          required = [
              "netbox_opennms/templates/netbox_opennms/requisition.html",
              "netbox_opennms/templates/netbox_opennms/dry_run.html",
              "netbox_opennms/templates/netbox_opennms/monitoringoverride.html",
              "netbox_opennms/templates/netbox_opennms/sync_preview.html",
              "netbox_opennms/templates/netbox_opennms/connection_test.html",
              "netbox_opennms/templates/netbox_opennms/inc/sync_status_panel.html",
          ]
          missing = [r for r in required if r not in names]
          if missing:
              sys.exit(f"wheel is missing templates: {missing}")
          print(f"ok: all templates present in {wheel}")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/netbox-opennms-plugin/
    permissions:
      id-token: write  # OIDC — only this job may mint publish tokens
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
