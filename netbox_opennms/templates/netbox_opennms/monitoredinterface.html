{% extends 'generic/object.html' %}
{% load helpers %}

{% block content %}
  <div class="row">
    <div class="col col-md-6">
      <div class="card">
        <h2 class="card-header">Monitored Interface</h2>
        <table class="table table-hover attr-table">
          <tr><th scope="row">Override</th><td>{{ object.override|linkify }}</td></tr>
          <tr><th scope="row">Interface IP</th><td>{{ object.ip_address|linkify }}</td></tr>
          <tr><th scope="row">Role</th><td>{{ object.get_role_display }}</td></tr>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
